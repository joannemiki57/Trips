name: Trips
options:
  bundleIdPrefix: com.you
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  Trips:
    type: application
    platform: iOS
    sources:
      - path: Trips
        excludes:
          - "**/.DS_Store"
          - "Resources/Info.plist"
          - "Resources/Trips.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.you.trips
        INFOPLIST_FILE: Trips/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Trips/Resources/Trips.entitlements
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""

  TripsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TripsTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Trips
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.you.trips.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Trips.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Trips
        GENERATE_INFOPLIST_FILE: YES

  TripsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TripsUITests
        excludes:
          - "**/.DS_Store"
        createIntermediateGroups: true
        optional: true
    dependencies:
      - target: Trips
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.you.trips.uitests
        TEST_TARGET_NAME: Trips
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Trips:
    build:
      targets:
        Trips: all
        TripsTests: [test]
        TripsUITests: [test]
    test:
      targets:
        - TripsTests
        - TripsUITests
      gatherCoverageData: true
